name: Remote Video Downloader

# Runs the project's own CLI (cli.py / main.py --cli) on GitHub's servers,
# so the actual download happens on GitHub's fast connection instead of yours.
# The finished file is uploaded as a workflow artifact you download once, at the end.
#
# Usage:
#   1. Go to Actions -> "Remote Video Downloader" -> "Run workflow"
#   2. Fill in the inputs (only "video_url" is required)
#   3. Wait for the run to finish
#   4. Open the finished run -> scroll to "Artifacts" -> download the zip

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Video URL to download"
        required: true
        type: string
      format:
        description: "Output format"
        required: false
        default: "mp4 (with Audio)"
        type: choice
        options:
          - "mp4 (with Audio)"
          - "mp4 (without Audio)"
          - "mp3"
          - "avi"
          - "mkv"
      resolution:
        description: "Max video height (ignored for mp3)"
        required: false
        default: "best"
        type: choice
        options:
          - "best"
          - "1080"
          - "720"
          - "480"
          - "360"
      bitrate:
        description: "Audio bitrate in kbps (ignored for 'mp4 (without Audio)')"
        required: false
        default: "192"
        type: choice
        options:
          - "320"
          - "256"
          - "192"
          - "128"
      filename:
        description: "Optional output filename, without extension (leave empty to use the video title)"
        required: false
        default: ""
        type: string
      ytdlp_args:
        description: 'Optional raw yt-dlp args, e.g. --cookies cookies.txt --proxy socks5://127.0.0.1:1080'
        required: false
        default: ""
        type: string

jobs:
  download:
    name: Download video
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> "$GITHUB_OUTPUT"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-remote-dl-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-remote-dl-${{ hashFiles('requirements.txt') }}-
            pip-remote-dl-

      - name: Install system dependencies (ffmpeg + Qt runtime libs)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ffmpeg \
            libxcb-xinerama0 libxcb-cursor0 libgl1 libegl1 \
            libdbus-1-3 libxkbcommon-x11-0

      - name: Install Deno (used by yt-dlp for YouTube signature/nsig solving)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Prepare output folder
        run: mkdir -p "$GITHUB_WORKSPACE/downloads"

      - name: Run downloader (CLI, non-interactive)
        env:
          QT_QPA_PLATFORM: offscreen
          VD_URL: ${{ inputs.video_url }}
          VD_FORMAT: ${{ inputs.format }}
          VD_RESOLUTION: ${{ inputs.resolution }}
          VD_BITRATE: ${{ inputs.bitrate }}
          VD_FILENAME: ${{ inputs.filename }}
          VD_YTDLP_ARGS: ${{ inputs.ytdlp_args }}
        run: |
          set -e

          ARGS=(--cli "$VD_URL" -f "$VD_FORMAT" -d "$GITHUB_WORKSPACE/downloads")

          # Mirrors cli.py's own logic for when each flag is actually relevant.
          if [ "$VD_FORMAT" != "mp3" ]; then
            ARGS+=(-r "$VD_RESOLUTION")
          fi
          if [ "$VD_FORMAT" != "mp4 (without Audio)" ]; then
            ARGS+=(-b "$VD_BITRATE")
          fi
          if [ -n "$VD_FILENAME" ]; then
            ARGS+=(-n "$VD_FILENAME")
          fi

          echo "Running: python main.py ${ARGS[*]} ${VD_YTDLP_ARGS:+-a $VD_YTDLP_ARGS}"

          if [ -n "$VD_YTDLP_ARGS" ]; then
            # Word-split intentionally: lets multi-flag strings like
            # "--cookies cookies.txt --proxy socks5://..." work as separate -a tokens.
            python main.py "${ARGS[@]}" -a $VD_YTDLP_ARGS
          else
            python main.py "${ARGS[@]}"
          fi

      - name: List downloaded files
        run: ls -lh "$GITHUB_WORKSPACE/downloads"

      - name: Upload downloaded file(s) as artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-download-${{ github.run_id }}
          path: downloads/**
          if-no-files-found: error
          retention-days: 3

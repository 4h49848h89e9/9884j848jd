name: Video Downloader (fixed)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL to download"
        required: true
        default: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      format:
        description: "Output format (mp4 (with Audio), mp4 (without Audio), mp3)"
        required: false
        default: "mp4 (with Audio)"
      resolution:
        description: "Video quality (best, 1080, 720, 480, 360)"
        required: false
        default: "720"
      bitrate:
        description: "Audio bitrate (320, 256, 192, 128)"
        required: false
        default: "192"
      filename:
        description: "Custom output filename (without extension, leave empty for original title)"
        required: false
        default: ""
      download_playlist:
        description: "Download entire playlist (true/false)"
        required: false
        default: "false"

jobs:
  download:
    runs-on: ubuntu-latest
    name: Download video with yt-dlp

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg and yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install --upgrade pip
          pip install yt-dlp

      - name: Prepare download folder
        run: mkdir -p downloads

      - name: Download video
        id: download
        run: |
          set -euxo pipefail

          # Read inputs
          URL="${{ github.event.inputs.url }}"
          FORMAT="${{ github.event.inputs.format }}"
          RES="${{ github.event.inputs.resolution }}"
          BIT="${{ github.event.inputs.bitrate }}"
          FNAME="${{ github.event.inputs.filename }}"
          PLAYLIST="${{ github.event.inputs.download_playlist }}"
          OUTDIR="downloads"

          # Build output template
          if [ -n "$FNAME" ]; then
            OUTPUT="${OUTDIR}/${FNAME}.%(ext)s"
          else
            OUTPUT="${OUTDIR}/%(title)s.%(ext)s"
          fi

          # Build format options
          FORMAT_OPTS=""
          if [ "$FORMAT" = "mp3" ]; then
            FORMAT_OPTS="-x --audio-format mp3 --audio-quality ${BIT}"
          elif [ "$FORMAT" = "mp4 (with Audio)" ]; then
            if [ "$RES" = "best" ]; then
              FORMAT_OPTS="-f bestvideo+bestaudio"
            else
              FORMAT_OPTS="-f 'bestvideo[height<=${RES}]+bestaudio/best[height<=${RES}]'"
            fi
          elif [ "$FORMAT" = "mp4 (without Audio)" ]; then
            if [ "$RES" = "best" ]; then
              FORMAT_OPTS="-f bestvideo"
            else
              FORMAT_OPTS="-f 'bestvideo[height<=${RES}]'"
            fi
          else
            # fallback: just get best
            FORMAT_OPTS="-f best"
          fi

          # Playlist option
          PLAYLIST_OPTS="--no-playlist"
          if [ "$PLAYLIST" = "true" ]; then
            PLAYLIST_OPTS="--yes-playlist"
          fi

          # Execute download
          echo "Running yt-dlp..."
          yt-dlp \
            --no-check-certificates \
            --ignore-errors \
            --no-warnings \
            -o "$OUTPUT" \
            $FORMAT_OPTS \
            $PLAYLIST_OPTS \
            "$URL"

          # Check if files exist
          echo "Downloaded files:"
          find downloads -type f -exec ls -lh {} \;

          # Signal success only if at least one file was downloaded
          if [ "$(find downloads -type f | wc -l)" -gt 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "::error::No files were downloaded"
            exit 1
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-download-${{ github.run_id }}
          path: downloads/*
          retention-days: 7
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          echo "# 📥 Download Result" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ steps.download.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ github.event.inputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Format** | ${{ github.event.inputs.format }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resolution** | ${{ github.event.inputs.resolution }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bitrate** | ${{ github.event.inputs.bitrate }} |" >> $GITHUB_STEP_SUMMARY

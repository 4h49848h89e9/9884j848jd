name: YouTube Downloader (No Cookies - Complete)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      format:
        description: 'Format'
        required: false
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mp3

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install yt-dlp
      
      - name: Download with multiple methods
        id: download
        continue-on-error: true
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          
          # Method A: Try yt-dlp first
          echo "📥 Method A: yt-dlp"
          if yt-dlp \
            --extractor-args "youtube:player_client=android_embedded" \
            --extractor-args "youtube:skip=webpage,player_js" \
            --user-agent "Mozilla/5.0 (Linux; Android 13)" \
            --no-check-certificate \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "downloads/video.%(ext)s" \
            "$URL" 2>/dev/null; then
            echo "✅ Method A succeeded"
          else
            echo "⚠️ Method A failed, trying Method B..."
            
            # Method B: Try with web client
            yt-dlp \
              --extractor-args "youtube:player_client=web" \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -f "best[ext=mp4]" \
              -o "downloads/video.%(ext)s" \
              "$URL" 2>/dev/null || \
            echo "⚠️ Method B failed, trying Method C..."
            
            # Method C: Try API
            if [ "$FORMAT" == "mp3" ]; then
              curl -L "https://api.vevioz.com/api/button/mp3/$URL" -o downloads/video.mp3 2>/dev/null
            else
              curl -L "https://api.vevioz.com/api/button/mp4/$URL" -o downloads/video.mp4 2>/dev/null
            fi
          fi
          
          # Get filename
          FILE=$(ls -t downloads/ 2>/dev/null | head -n1)
          if [ -n "$FILE" ]; then
            echo "file=$FILE" >> $GITHUB_OUTPUT
            echo "✅ Downloaded: $FILE"
            ls -lh "downloads/$FILE"
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: downloads/
          retention-days: 7

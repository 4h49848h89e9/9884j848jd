name: Video Downloader (core CLI)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL to download'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
      format:
        description: 'Output format (mp4 (with Audio), mp4 (without Audio), mp3, avi, mkv)'
        required: false
        default: 'mp4 (with Audio)'
      resolution:
        description: 'Video quality (best, 1080, 720, 480, 360)'
        required: false
        default: '720'
      bitrate:
        description: 'Audio bitrate (320, 256, 192, 128)'
        required: false
        default: '192'
      filename:
        description: 'Custom output filename (without extension, leave empty for original title)'
        required: false
        default: ''
      download_playlist:
        description: 'Download entire playlist (true/false)'
        required: false
        default: 'false'

jobs:
  download:
    runs-on: ubuntu-latest
    name: Download with core CLI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies and ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare cookies file from secret
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            echo "✅ Cookies file created."
          else
            echo "⚠️ No YOUTUBE_COOKIES secret set – downloads may fail on YouTube."
            touch cookies.txt   # empty file to avoid 'file not found' errors
          fi

      - name: Create download folder
        run: mkdir -p downloads

      - name: Run download via core CLI
        id: download
        run: |
          set -euxo pipefail

          # Build the yt-dlp extra arguments (cookies + playlist)
          YTDLP_ARGS="--cookies cookies.txt"
          if [[ "${{ github.event.inputs.download_playlist }}" == "true" ]]; then
            YTDLP_ARGS="$YTDLP_ARGS --yes-playlist"
          else
            YTDLP_ARGS="$YTDLP_ARGS --no-playlist"
          fi

          # Prepare CLI arguments
          CLI_ARGS=""
          if [[ -n "${{ github.event.inputs.filename }}" ]]; then
            CLI_ARGS="$CLI_ARGS -n \"${{ github.event.inputs.filename }}\""
          fi

          # Use explicit download folder (./downloads) for reliable artifact upload
          CLI_ARGS="$CLI_ARGS -d ./downloads"

          # Run the CLI with all options
          python main.py --cli \
            "${{ github.event.inputs.url }}" \
            -f "${{ github.event.inputs.format }}" \
            -r "${{ github.event.inputs.resolution }}" \
            -b "${{ github.event.inputs.bitrate }}" \
            $CLI_ARGS \
            -a $YTDLP_ARGS

          # List downloaded files (for debugging)
          echo "Downloaded files:"
          find downloads -type f -exec ls -lh {} \;

          # Signal success if at least one file exists
          if [ "$(find downloads -type f | wc -l)" -gt 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "::error::No files were downloaded"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-download-${{ github.run_id }}
          path: downloads/*
          retention-days: 7
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          echo "# 📥 Download Result" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ steps.download.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ github.event.inputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Format** | ${{ github.event.inputs.format }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resolution** | ${{ github.event.inputs.resolution }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bitrate** | ${{ github.event.inputs.bitrate }} |" >> $GITHUB_STEP_SUMMARY

# .github/workflows/main.yml
# Complete Video Downloader - Downloads videos directly in GitHub Actions
# Takes the exact same inputs as the program and downloads the video

name: Video Downloader - Download Videos via GitHub Actions

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL to download"
        required: true
        default: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      
      format:
        description: "Output format"
        required: false
        default: "mp4 (with Audio)"
        type: choice
        options:
          - "mp4 (with Audio)"
          - "mp4 (without Audio)"
          - "mp3"
          - "avi"
          - "mkv"
      
      resolution:
        description: "Video quality (max height)"
        required: false
        default: "best"
        type: choice
        options:
          - "best"
          - "1080"
          - "720"
          - "480"
          - "360"
      
      bitrate:
        description: "Audio bitrate (kbps)"
        required: false
        default: "192"
        type: choice
        options:
          - "320"
          - "256"
          - "192"
          - "128"
      
      filename:
        description: "Custom filename (without extension)"
        required: false
        default: ""
      
      download_playlist:
        description: "Download entire playlist"
        required: false
        default: "false"
        type: boolean
      
      ytdlp_args:
        description: "Additional yt-dlp arguments"
        required: false
        default: ""

jobs:
  download-video:
    name: Download Video
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp requests

      - name: Download video
        id: download
        run: |
          # Build the yt-dlp command
          YTDLP_CMD="yt-dlp"
          
          # Handle playlist option
          if [ "${{ inputs.download_playlist }}" == "true" ]; then
            YTDLP_CMD="$YTDLP_CMD --yes-playlist"
          else
            YTDLP_CMD="$YTDLP_CMD --no-playlist"
          fi
          
          # Handle format
          case "${{ inputs.format }}" in
            "mp4 (with Audio)")
              YTDLP_CMD="$YTDLP_CMD -f bestvideo+bestaudio/best --merge-output-format mp4"
              ;;
            "mp4 (without Audio)")
              YTDLP_CMD="$YTDLP_CMD -f bestvideo --merge-output-format mp4"
              ;;
            "mp3")
              YTDLP_CMD="$YTDLP_CMD -f bestaudio --extract-audio --audio-format mp3 --audio-quality ${{ inputs.bitrate }}"
              ;;
            "avi")
              YTDLP_CMD="$YTDLP_CMD -f bestvideo+bestaudio/best --merge-output-format avi"
              ;;
            "mkv")
              YTDLP_CMD="$YTDLP_CMD -f bestvideo+bestaudio/best --merge-output-format mkv"
              ;;
          esac
          
          # Handle resolution for video formats
          if [ "${{ inputs.format }}" != "mp3" ] && [ "${{ inputs.format }}" != "mp4 (without Audio)" ]; then
            if [ "${{ inputs.resolution }}" != "best" ]; then
              YTDLP_CMD="$YTDLP_CMD -S res:${{ inputs.resolution }}"
            fi
          fi
          
          # Handle custom filename
          if [ -n "${{ inputs.filename }}" ]; then
            YTDLP_CMD="$YTDLP_CMD -o '${{ inputs.filename }}.%(ext)s'"
          fi
          
          # Handle additional yt-dlp arguments
          if [ -n "${{ inputs.ytdlp_args }}" ]; then
            YTDLP_CMD="$YTDLP_CMD ${{ inputs.ytdlp_args }}"
          fi
          
          # Add the URL
          YTDLP_CMD="$YTDLP_CMD '${{ inputs.url }}'"
          
          # Show the command
          echo "Running: $YTDLP_CMD"
          echo ""
          
          # Execute the download
          eval $YTDLP_CMD
          
          # Get the downloaded filename
          DOWNLOADED_FILE=$(ls -t *.mp4 *.mp3 *.avi *.mkv 2>/dev/null | head -1)
          echo "downloaded_file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
          
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "No file was downloaded!"
            exit 1
          fi
          
          echo "Downloaded: $DOWNLOADED_FILE"

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: ${{ steps.download.outputs.downloaded_file }}
          if-no-files-found: error

      - name: Show download information
        if: always()
        run: |
          echo "## Video Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ inputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ inputs.format }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Resolution | ${{ inputs.resolution }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bitrate | ${{ inputs.bitrate }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Filename | ${{ inputs.filename || 'Auto-generated' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playlist | ${{ inputs.download_playlist }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download Artifact" >> $GITHUB_STEP_SUMMARY
          echo "The downloaded video is available in the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
          
          if [ -f "${{ steps.download.outputs.downloaded_file }}" ]; then
            FILE_SIZE=$(du -h "${{ steps.download.outputs.downloaded_file }}" | cut -f1)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**File:** ${{ steps.download.outputs.downloaded_file }}" >> $GITHUB_STEP_SUMMARY
            echo "**Size:** $FILE_SIZE" >> $GITHUB_STEP_SUMMARY
          fi

  # Alternative: Download via custom Python script (more robust)
  download-via-python:
    name: Download Video (Python Script)
    runs-on: ubuntu-latest
    needs: [download-video]
    if: failure()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install yt-dlp requests

      - name: Create download script
        run: |
          cat > download_video.py << 'EOF'
          import os
          import sys
          import yt_dlp
          
          url = sys.argv[1] if len(sys.argv) > 1 else ""
          fmt = sys.argv[2] if len(sys.argv) > 2 else "mp4 (with Audio)"
          resolution = sys.argv[3] if len(sys.argv) > 3 else "best"
          bitrate = sys.argv[4] if len(sys.argv) > 4 else "192"
          filename = sys.argv[5] if len(sys.argv) > 5 else ""
          playlist = sys.argv[6] if len(sys.argv) > 6 else "false"
          
          ydl_opts = {
              'quiet': False,
              'no_warnings': False,
              'ignoreerrors': True,
          }
          
          # Handle playlist
          ydl_opts['noplaylist'] = playlist != 'true'
          
          # Handle format
          if fmt == "mp4 (with Audio)":
              ydl_opts['format'] = 'bestvideo+bestaudio/best'
              ydl_opts['merge_output_format'] = 'mp4'
          elif fmt == "mp4 (without Audio)":
              ydl_opts['format'] = 'bestvideo'
              ydl_opts['merge_output_format'] = 'mp4'
          elif fmt == "mp3":
              ydl_opts['format'] = 'bestaudio'
              ydl_opts['postprocessors'] = [{
                  'key': 'FFmpegExtractAudio',
                  'preferredcodec': 'mp3',
                  'preferredquality': bitrate,
              }]
          elif fmt == "avi":
              ydl_opts['format'] = 'bestvideo+bestaudio/best'
              ydl_opts['merge_output_format'] = 'avi'
          elif fmt == "mkv":
              ydl_opts['format'] = 'bestvideo+bestaudio/best'
              ydl_opts['merge_output_format'] = 'mkv'
          
          # Handle resolution
          if resolution != "best" and fmt != "mp3":
              ydl_opts['format'] = ydl_opts['format'] + f"[height<={resolution}]"
          
          # Handle filename
          if filename:
              ydl_opts['outtmpl'] = f'{filename}.%(ext)s'
          
          try:
              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  ydl.download([url])
              print("Download completed successfully!")
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          EOF

      - name: Download video using Python
        id: python_download
        run: |
          python download_video.py \
            "${{ inputs.url }}" \
            "${{ inputs.format }}" \
            "${{ inputs.resolution }}" \
            "${{ inputs.bitrate }}" \
            "${{ inputs.filename }}" \
            "${{ inputs.download_playlist }}"
          
          DOWNLOADED_FILE=$(ls -t *.mp4 *.mp3 *.avi *.mkv 2>/dev/null | head -1)
          echo "downloaded_file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video-python
          path: ${{ steps.python_download.outputs.downloaded_file }}
          if-no-files-found: error

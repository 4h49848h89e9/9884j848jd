name: YouTube Downloader (All Qualities - Fixed)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
        placeholder: 'https://www.youtube.com/watch?v=...'
      
      format:
        description: 'Download Format'
        required: false
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mp3
      
      quality:
        description: 'Video Quality'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
          - 360p
          - audio-only

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install --upgrade yt-dlp
      
      - name: Download YouTube Video
        id: download
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          echo "🎬 Downloading: $URL"
          echo "📁 Format: $FORMAT"
          echo "📊 Quality: $QUALITY"
          
          # Set quality filter
          case "$QUALITY" in
            "1080p") QUALITY_FILTER="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
            "720p")  QUALITY_FILTER="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            "480p")  QUALITY_FILTER="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
            "360p")  QUALITY_FILTER="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
            "audio-only") QUALITY_FILTER="bestaudio" ;;
            *)       QUALITY_FILTER="bestvideo+bestaudio/best" ;;
          esac
          
          # METHOD 1: Try yt-dlp (most reliable)
          echo "📥 Method 1: Using yt-dlp..."
          
          if [ "$QUALITY" == "audio-only" ] || [ "$FORMAT" == "mp3" ]; then
            yt-dlp \
              --no-check-certificate \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --extractor-args "youtube:player_client=android_embedded" \
              --extractor-args "youtube:skip=webpage,player_js" \
              --sleep-interval 2 \
              --max-sleep-interval 5 \
              --retries 10 \
              --fragment-retries 10 \
              -f bestaudio \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality 0 \
              -o "downloads/video.%(ext)s" \
              "$URL" 2>&1
          else
            yt-dlp \
              --no-check-certificate \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --extractor-args "youtube:player_client=android_embedded" \
              --extractor-args "youtube:skip=webpage,player_js" \
              --sleep-interval 2 \
              --max-sleep-interval 5 \
              --retries 10 \
              --fragment-retries 10 \
              -f "$QUALITY_FILTER" \
              --merge-output-format mp4 \
              -o "downloads/video.%(ext)s" \
              "$URL" 2>&1
          fi
          
          # Check if download succeeded and file is valid
          FILE=$(find downloads -type f -size +100k 2>/dev/null | head -n1)
          
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            SIZE=$(du -h "$FILE" | cut -f1)
            echo "✅ Download successful!"
            echo "📁 File: $(basename "$FILE")"
            echo "📊 Size: $SIZE"
            echo "file=$(basename "$FILE")" >> $GITHUB_OUTPUT
          else
            echo "⚠️ yt-dlp failed, trying METHOD 2: Free APIs..."
            
            # METHOD 2: Try free APIs
            ENCODED_URL=$(echo "$URL" | sed 's/&/%26/g' | sed 's/?/%3F/g')
            
            if [ "$QUALITY" == "audio-only" ] || [ "$FORMAT" == "mp3" ]; then
              echo "🎵 Downloading audio via API..."
              curl -L --max-time 60 -o downloads/audio.mp3 \
                "https://api.vevioz.com/api/button/mp3/$URL" 2>/dev/null || \
              curl -L --max-time 60 -o downloads/audio.mp3 \
                "https://youtube-mp3-api.com/api/convert?url=$ENCODED_URL" 2>/dev/null || \
              curl -L --max-time 60 -o downloads/audio.mp3 \
                "https://yt-api.com/api/audio?url=$ENCODED_URL" 2>/dev/null
              
              # Check if valid
              if [ -f "downloads/audio.mp3" ] && [ $(stat -c%s "downloads/audio.mp3") -gt 100000 ]; then
                echo "✅ Audio downloaded via API"
                mv downloads/audio.mp3 downloads/video.mp3
                echo "file=video.mp3" >> $GITHUB_OUTPUT
              fi
            else
              echo "🎬 Downloading video via API..."
              curl -L --max-time 60 -o downloads/video.mp4 \
                "https://api.vevioz.com/api/button/mp4/$URL" 2>/dev/null || \
              curl -L --max-time 60 -o downloads/video.mp4 \
                "https://yt-api.com/api/video?url=$ENCODED_URL" 2>/dev/null || \
              curl -L --max-time 60 -o downloads/video.mp4 \
                "https://youtube-mp4-api.com/api/convert?url=$ENCODED_URL" 2>/dev/null
              
              # Check if valid
              if [ -f "downloads/video.mp4" ] && [ $(stat -c%s "downloads/video.mp4") -gt 100000 ]; then
                echo "✅ Video downloaded via API"
                echo "file=video.mp4" >> $GITHUB_OUTPUT
              fi
            fi
          fi
          
          # Final check
          FINAL_FILE=$(find downloads -type f -size +100k 2>/dev/null | head -n1)
          if [ -z "$FINAL_FILE" ]; then
            echo "❌ All download methods failed!"
            echo "💡 The video might be:"
            echo "   - Private or unlisted"
            echo "   - Age-restricted"
            echo "   - Region-blocked"
            echo "   - Not available"
            echo ""
            echo "📝 Creating error file..."
            echo "Download failed. Please try with cookies method or a different URL." > downloads/ERROR.txt
            echo "file=ERROR.txt" >> $GITHUB_OUTPUT
            exit 0
          fi
      
      - name: Verify downloaded file
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 FILE VERIFICATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          FILE=$(find downloads -type f -size +100k 2>/dev/null | head -n1)
          
          if [ -n "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
            echo "✅ File found: $(basename "$FILE")"
            echo "📊 Size: $(numfmt --to=iec $SIZE 2>/dev/null || echo "$SIZE bytes")"
            
            # Check if it's a real video/audio file
            if file "$FILE" | grep -qE "(MP4|MPEG|audio|video|media)"; then
              echo "✅ Valid media file detected!"
              
              # Try to get duration
              if command -v ffprobe &> /dev/null; then
                DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null)
                if [ -n "$DURATION" ]; then
                  echo "⏱️ Duration: $(date -d@${DURATION%.*} -u +%H:%M:%S 2>/dev/null || echo "Unknown")"
                fi
              fi
            else
              echo "⚠️ Warning: File may not be a valid video file"
              echo "Content preview:"
              head -c 200 "$FILE"
            fi
          else
            echo "❌ No valid file found (>100KB)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download-${{ github.run_id }}
          path: downloads/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Final result
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════╗"
          echo "║          DOWNLOAD RESULT                  ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          
          FILE=$(find downloads -type f -size +100k 2>/dev/null | head -n1)
          
          if [ -n "$FILE" ]; then
            SIZE=$(du -h "$FILE" | cut -f1)
            echo "✅ STATUS: SUCCESS"
            echo "📁 FILE: $(basename "$FILE")"
            echo "📊 SIZE: $SIZE"
            echo "📥 Download from: Artifacts section (top of page)"
            echo ""
            echo "🎉 The video was downloaded successfully!"
          else
            echo "❌ STATUS: FAILED"
            echo ""
            echo "💡 The video could not be downloaded because:"
            echo "   1. YouTube is blocking GitHub's IP addresses"
            echo "   2. The video might be private or restricted"
            echo "   3. The API services are rate-limited"
            echo ""
            echo "🔧 SOLUTIONS:"
            echo "   • Try a different URL"
            echo "   • Wait 5-10 minutes and try again"
            echo "   • Use the COOKIES method (most reliable)"
            echo "   • Download locally using: yt-dlp -f best \"URL\""
          fi

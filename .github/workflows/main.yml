name: YouTube Downloader (Docker)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    container:
      image: mikenye/youtube-dl:latest
    
    steps:
      - name: Download video
        run: |
          mkdir -p /github/workspace/downloads
          youtube-dl -f best -o "/github/workspace/downloads/video.%(ext)s" "${{ github.event.inputs.url }}"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: downloads/

# .github/workflows/main.yml
# Complete GitHub Actions workflow for Video Downloader
# Builds binaries for Windows, Linux (dir/AppImage/deb), and macOS (Intel/Apple Silicon)

name: Build and Package Video Downloader

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 2.2.1)"
        required: true
        default: "0.0.0"
      targets:
        description: "Build targets (comma-separated: windows, linux, appimage, deb, mac)"
        required: false
        default: "windows, linux, appimage, deb, mac"
      upload_to_release:
        description: "Upload to GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  release:
    description: "Create release and upload binaries"
    types: [created]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB: build-windows
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (exe)
    runs-on: windows-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.targets, 'windows') || github.event.inputs.targets == '')) ||
      (github.event_name == 'release')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        shell: pwsh
        run: echo "week=$(Get-Date -UFormat '%Y-%V')" >> $env:GITHUB_OUTPUT

      - name: Cache pip (Windows)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-win-${{ hashFiles('requirements.txt') }}-
            pip-win-

      - name: Cache PyInstaller (Windows)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Roaming\pyinstaller
          key: pyinstaller-win-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-win-py3.12-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build with PyInstaller (Windows)
        run: |
          python -m PyInstaller `
            --noconfirm --onedir --windowed --clean --noupx `
            --icon=icon.png `
            --exclude-module pycryptodomex.selftest `
            --exclude-module pycryptodomex.tests `
            --name "Video Downloader" `
            main.py

      - name: Zip portable output (Windows)
        run: |
          Compress-Archive -Path "dist\Video Downloader" -DestinationPath "Windows_x64-portable.zip"

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Windows
          path: Windows_x64-portable.zip

      - name: Upload to release (Windows)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: Windows_x64-portable.zip
          asset_name: VideoDownloader-Windows-x64-${{ github.event.inputs.version || github.ref_name }}.zip
          asset_content_type: application/zip

  # ──────────────────────────────────────────────────────────────
  # JOB: build-linux
  # ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (dir / AppImage / deb)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.targets, 'linux') || contains(github.event.inputs.targets, 'appimage') || contains(github.event.inputs.targets, 'deb') || github.event.inputs.targets == '')) ||
      (github.event_name == 'release')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      - name: Cache pip (Linux)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-linux-${{ hashFiles('requirements.txt') }}-
            pip-linux-

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/main.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libgl1 libegl1 \
            libdbus-1-3 libxkbcommon-x11-0 \
            fuse libfuse2 \
            dpkg-dev \
            file

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/appimagetool
          key: appimagetool-x86_64-continuous

      - name: Download appimagetool (if not cached)
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          sudo wget -q \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      # ── 1. PyInstaller build ─────────────────────────────────
      - name: PyInstaller build (Linux)
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --windowed --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --name "Video Downloader" \
            main.py

      # ── 2. Zip the portable directory ──────────────────────────
      - name: Zip portable output (Linux)
        run: |
          mkdir -p zip_out
          cp -r "dist/Video Downloader" "zip_out/Video Downloader"
          cd zip_out
          zip -r "../Linux_x64-portable.zip" "Video Downloader"

      - name: Upload artifact (Linux directory)
        uses: actions/upload-artifact@v4
        if: contains(github.event.inputs.targets, 'linux') || github.event.inputs.targets == '' || github.event_name == 'release'
        with:
          name: VideoDownloader-Linux
          path: Linux_x64-portable.zip

      # ── 3. AppImage ──────────────────────────────────────────
      - name: Create AppDir
        if: contains(github.event.inputs.targets, 'appimage') || github.event.inputs.targets == '' || github.event_name == 'release'
        run: |
          APPDIR="AppDir"
          BIN_SRC="dist/Video Downloader"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp -r "$BIN_SRC"/. "$APPDIR/usr/bin/"
          cp icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/video-downloader.png"
          cp icon.png "$APPDIR/video-downloader.png"

          cat > "$APPDIR/usr/share/applications/video-downloader.desktop" <<EOF
          [Desktop Entry]
          Name=Video Downloader
          Exec=Video Downloader
          Icon=video-downloader
          Type=Application
          Categories=AudioVideo;Network;
          X-AppImage-Version=${{ github.event.inputs.version || github.ref_name }}
          EOF

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Video Downloader" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cp "$APPDIR/usr/share/applications/video-downloader.desktop" "$APPDIR/video-downloader.desktop"

      - name: Build AppImage
        if: contains(github.event.inputs.targets, 'appimage') || github.event.inputs.targets == '' || github.event_name == 'release'
        run: |
          ARCH=x86_64 appimagetool AppDir VideoDownloader-x86_64-${{ github.event.inputs.version || github.ref_name }}.AppImage

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        if: contains(github.event.inputs.targets, 'appimage') || github.event.inputs.targets == '' || github.event_name == 'release'
        with:
          name: VideoDownloader-AppImage
          path: VideoDownloader-x86_64-${{ github.event.inputs.version || github.ref_name }}.AppImage

      # ── 4. .deb package ──────────────────────────────────────
      - name: Create .deb package
        if: contains(github.event.inputs.targets, 'deb') || github.event.inputs.targets == '' || github.event_name == 'release'
        run: |
          PKG="video-downloader_amd64"
          BIN_SRC="dist/Video Downloader"

          mkdir -p "$PKG/usr/lib/video-downloader"
          mkdir -p "$PKG/usr/bin"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$PKG/DEBIAN"

          cp -r "$BIN_SRC"/. "$PKG/usr/lib/video-downloader/"

          cat > "$PKG/usr/bin/video-downloader" <<'EOF'
          #!/bin/sh
          exec /usr/lib/video-downloader/"Video Downloader" "$@"
          EOF
          chmod +x "$PKG/usr/bin/video-downloader"

          cp icon.png "$PKG/usr/share/icons/hicolor/256x256/apps/video-downloader.png"

          cat > "$PKG/usr/share/applications/video-downloader.desktop" <<EOF
          [Desktop Entry]
          Name=Video Downloader
          Exec=video-downloader
          Icon=video-downloader
          Type=Application
          Categories=AudioVideo;Network;
          EOF

          cat > "$PKG/DEBIAN/control" <<EOF
          Package: video-downloader
          Version: ${{ github.event.inputs.version || github.ref_name }}
          Architecture: amd64
          Maintainer: truelockmc
          Description: GUI & CLI video downloader powered by yt-dlp
          Depends: libgl1, libegl1, libdbus-1-3, libxkbcommon-x11-0
          EOF

          dpkg-deb --build --root-owner-group "$PKG"

      - name: Upload artifact (.deb)
        uses: actions/upload-artifact@v4
        if: contains(github.event.inputs.targets, 'deb') || github.event.inputs.targets == '' || github.event_name == 'release'
        with:
          name: VideoDownloader-deb
          path: "*.deb"

      # ── 5. Upload to release ──────────────────────────────────
      - name: Upload Linux directory to release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: Linux_x64-portable.zip
          asset_name: VideoDownloader-Linux-x64-${{ github.event.inputs.version || github.ref_name }}.zip
          asset_content_type: application/zip

      - name: Upload AppImage to release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: VideoDownloader-x86_64-${{ github.event.inputs.version || github.ref_name }}.AppImage
          asset_name: VideoDownloader-x86_64-${{ github.event.inputs.version || github.ref_name }}.AppImage
          asset_content_type: application/x-executable

      - name: Upload .deb to release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: video-downloader_amd64.deb
          asset_name: video-downloader_${{ github.event.inputs.version || github.ref_name }}_amd64.deb
          asset_content_type: application/vnd.debian.binary-package

  # ──────────────────────────────────────────────────────────────
  # JOB: build-mac-arm64
  # ──────────────────────────────────────────────────────────────
  build-mac-arm64:
    name: Build macOS Apple Silicon (arm64)
    runs-on: macos-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.targets, 'mac') || github.event.inputs.targets == '')) ||
      (github.event_name == 'release')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      - name: Cache pip (macOS arm64)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-arm64-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-mac-arm64-${{ hashFiles('requirements.txt') }}-
            pip-mac-arm64-

      - name: Cache PyInstaller (macOS arm64)
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/pyinstaller
          key: pyinstaller-mac-arm64-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-mac-arm64-py3.12-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build .app bundle (arm64)
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --windowed --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --target-arch arm64 \
            --name "Video Downloader" \
            main.py

      - name: Zip portable output (ditto)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Video Downloader.app" \
            "macOS_arm64-portable.zip"

      - name: Upload artifact (macOS arm64)
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-macOS-arm64
          path: macOS_arm64-portable.zip

      - name: Upload to release (macOS arm64)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: macOS_arm64-portable.zip
          asset_name: VideoDownloader-macOS-arm64-${{ github.event.inputs.version || github.ref_name }}.zip
          asset_content_type: application/zip

  # ──────────────────────────────────────────────────────────────
  # JOB: build-mac-x86_64
  # ──────────────────────────────────────────────────────────────
  build-mac-x86_64:
    name: Build macOS Intel (x86_64)
    runs-on: macos-15-intel
    if: |
      (github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.targets, 'mac') || github.event.inputs.targets == '')) ||
      (github.event_name == 'release')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      - name: Cache pip (macOS x86_64)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-x86_64-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-mac-x86_64-${{ hashFiles('requirements.txt') }}-
            pip-mac-x86_64-

      - name: Cache PyInstaller (macOS x86_64)
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/pyinstaller
          key: pyinstaller-mac-x86_64-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-mac-x86_64-py3.12-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build .app bundle (x86_64)
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --windowed --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --target-arch x86_64 \
            --name "Video Downloader" \
            main.py

      - name: Zip portable output (ditto)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Video Downloader.app" \
            "macOS_x86_64-portable.zip"

      - name: Upload artifact (macOS x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-macOS-x86_64
          path: macOS_x86_64-portable.zip

      - name: Upload to release (macOS x86_64)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: macOS_x86_64-portable.zip
          asset_name: VideoDownloader-macOS-x86_64-${{ github.event.inputs.version || github.ref_name }}.zip
          asset_content_type: application/zip

  # ──────────────────────────────────────────────────────────────
  # JOB: summary
  # ──────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-mac-arm64, build-mac-x86_64]
    if: always()
    steps:
      - name: Display build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.build-windows.result }} | VideoDownloader-Windows |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.build-linux.result }} | VideoDownloader-Linux, VideoDownloader-AppImage, VideoDownloader-deb |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (arm64) | ${{ needs.build-mac-arm64.result }} | VideoDownloader-macOS-arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (x86_64) | ${{ needs.build-mac-x86_64.result }} | VideoDownloader-macOS-x86_64 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts are available in the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY

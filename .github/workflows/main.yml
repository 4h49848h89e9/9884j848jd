name: Video Downloader - Run Inside GitHub Actions

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL to download"
        required: true
        default: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      format:
        description: "Output format (mp4 (with Audio), mp4 (without Audio), mp3, avi, mkv)"
        required: false
        default: "mp4 (with Audio)"
      resolution:
        description: "Video quality (best, 1080, 720, 480, 360)"
        required: false
        default: "720"
      bitrate:
        description: "Audio bitrate (320, 256, 192, 128)"
        required: false
        default: "192"
      filename:
        description: "Output filename (without extension)"
        required: false
        default: "downloaded_video"
      folder:
        description: "Download folder"
        required: false
        default: "downloads"
      download_playlist:
        description: "Download entire playlist (true/false)"
        required: false
        default: "false"

jobs:
  download-video:
    name: Download Video Using Video Downloader
    runs-on: ubuntu-latest
    
    steps:
      # ────────────────────────────────────────────────────────────
      # 1. Clone repository
      # ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────
      # 2. Setup Python
      # ────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ────────────────────────────────────────────────────────────
      # 3. Install FFmpeg
      # ────────────────────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      # ────────────────────────────────────────────────────────────
      # 4. Install Deno with PATH fix
      # ────────────────────────────────────────────────────────────
      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
        shell: bash

      # ────────────────────────────────────────────────────────────
      # 5. Verify Deno installation
      # ────────────────────────────────────────────────────────────
      - name: Verify Deno
        run: |
          deno --version
        shell: bash

      # ────────────────────────────────────────────────────────────
      # 6. Install Python dependencies
      # ────────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ────────────────────────────────────────────────────────────
      # 7. Create download directory
      # ────────────────────────────────────────────────────────────
      - name: Create download directory
        run: |
          mkdir -p ${{ github.event.inputs.folder }}
          echo "Download directory created: ${{ github.event.inputs.folder }}"

      # ────────────────────────────────────────────────────────────
      # 8. Build CLI command
      # ────────────────────────────────────────────────────────────
      - name: Build CLI command
        id: build_cmd
        run: |
          CMD="python main.py --cli \"${{ github.event.inputs.url }}\""
          
          if [ -n "${{ github.event.inputs.format }}" ]; then
            CMD="$CMD -f \"${{ github.event.inputs.format }}\""
          fi
          
          if [ -n "${{ github.event.inputs.resolution }}" ]; then
            CMD="$CMD -r \"${{ github.event.inputs.resolution }}\""
          fi
          
          if [ -n "${{ github.event.inputs.bitrate }}" ]; then
            CMD="$CMD -b \"${{ github.event.inputs.bitrate }}\""
          fi
          
          if [ -n "${{ github.event.inputs.filename }}" ]; then
            CMD="$CMD -n \"${{ github.event.inputs.filename }}\""
          fi
          
          if [ -n "${{ github.event.inputs.folder }}" ]; then
            CMD="$CMD -d \"${{ github.event.inputs.folder }}\""
          fi
          
          if [ "${{ github.event.inputs.download_playlist }}" == "true" ]; then
            CMD="$CMD -a \"--yes-playlist\""
          else
            CMD="$CMD -a \"--no-playlist\""
          fi
          
          echo "command=$CMD" >> $GITHUB_OUTPUT
          echo "📝 Command: $CMD"
        shell: bash

      # ────────────────────────────────────────────────────────────
      # 9. Run the downloader
      # ────────────────────────────────────────────────────────────
      - name: Download video
        run: |
          echo "🚀 Starting video download..."
          echo "=========================================="
          echo "Using your Video Downloader code"
          echo "Python: $(which python)"
          echo "Python version: $(python --version)"
          echo "FFmpeg: $(which ffmpeg)"
          echo "Deno: $(which deno || echo 'Deno not in PATH')"
          echo "Deno version: $(deno --version 2>/dev/null || echo 'Deno not available')"
          echo "=========================================="
          eval ${{ steps.build_cmd.outputs.command }}
          echo "=========================================="
          echo "✅ Download completed!"
        shell: bash

      # ────────────────────────────────────────────────────────────
      # 10. List downloaded files
      # ────────────────────────────────────────────────────────────
      - name: List downloaded files
        run: |
          echo "📁 Downloaded files in ${{ github.event.inputs.folder }}:"
          ls -la ${{ github.event.inputs.folder }}/ || echo "No files found"

      # ────────────────────────────────────────────────────────────
      # 11. Get file info
      # ────────────────────────────────────────────────────────────
      - name: Get file info
        id: file_info
        run: |
          if [ -d "${{ github.event.inputs.folder }}" ]; then
            FILE=$(ls -1 ${{ github.event.inputs.folder }}/ 2>/dev/null | head -1)
            if [ -n "$FILE" ]; then
              SIZE=$(du -h ${{ github.event.inputs.folder }}/$FILE 2>/dev/null | cut -f1)
              echo "filename=$FILE" >> $GITHUB_OUTPUT
              echo "size=$SIZE" >> $GITHUB_OUTPUT
              echo "📄 File: $FILE"
              echo "📊 Size: $SIZE"
            else
              echo "filename=No files found" >> $GITHUB_OUTPUT
              echo "size=0" >> $GITHUB_OUTPUT
              echo "⚠️ No files found in download folder"
            fi
          else
            echo "filename=Download folder not found" >> $GITHUB_OUTPUT
            echo "size=0" >> $GITHUB_OUTPUT
            echo "⚠️ Download folder doesn't exist"
          fi

      # ────────────────────────────────────────────────────────────
      # 12. Upload artifact
      # ────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video-${{ github.run_id }}
          path: ${{ github.event.inputs.folder }}/*
          retention-days: 7
          if-no-files-found: warn

      # ────────────────────────────────────────────────────────────
      # 13. Generate summary
      # ────────────────────────────────────────────────────────────
      - name: Generate summary
        run: |
          echo "# ✅ Video Download Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Download Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ github.event.inputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Format** | ${{ github.event.inputs.format }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resolution** | ${{ github.event.inputs.resolution }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bitrate** | ${{ github.event.inputs.bitrate }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Filename** | ${{ github.event.inputs.filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Download Playlist** | ${{ github.event.inputs.download_playlist }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | ${{ steps.file_info.outputs.filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ steps.file_info.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 Download Artifact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The downloaded video is available as a GitHub Actions artifact." >> $GITHUB_STEP_SUMMARY
          echo "You can download it from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          
          echo ""
          echo "=========================================="
          echo "✅ DOWNLOAD COMPLETE!"
          echo "=========================================="
          echo "📄 File: ${{ steps.file_info.outputs.filename }}"
          echo "📊 Size: ${{ steps.file_info.outputs.size }}"
          echo "📁 Artifact: downloaded-video-${{ github.run_id }}"
          echo "=========================================="

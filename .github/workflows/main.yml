name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL (Long or Short)'
        required: true
        type: string
        placeholder: 'https://www.youtube.com/watch?v=... or https://youtu.be/...'
      
      download_format:
        description: 'Download Format'
        required: false
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mp3
          - webm
      
      output_filename:
        description: 'Output filename (without extension, optional)'
        required: false
        type: string
        default: 'youtube_video'

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
          # Install ffmpeg for merging audio/video
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download YouTube Video
        id: download
        run: |
          # Create downloads directory
          mkdir -p downloads
          
          # Set output template
          if [ "${{ github.event.inputs.output_filename }}" != "" ]; then
            OUTPUT_NAME="${{ github.event.inputs.output_filename }}"
          else
            OUTPUT_NAME="youtube_video"
          fi
          
          # Build yt-dlp command based on format
          if [ "${{ github.event.inputs.download_format }}" == "mp3" ]; then
            # Audio only - best quality
            yt-dlp -f bestaudio --extract-audio --audio-format mp3 --audio-quality 0 \
              -o "downloads/${OUTPUT_NAME}.%(ext)s" \
              "${{ github.event.inputs.video_url }}"
          else
            # Video - auto best quality (handles both long and short videos)
            # For shorts or any video, this automatically selects the best available quality
            yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              -o "downloads/${OUTPUT_NAME}.%(ext)s" \
              "${{ github.event.inputs.video_url }}"
          fi
          
          # Get the actual downloaded filename
          DOWNLOADED_FILE=$(ls -t downloads/ | head -n1)
          echo "downloaded_file=${DOWNLOADED_FILE}" >> $GITHUB_OUTPUT
          echo "Download complete: ${DOWNLOADED_FILE}"

      - name: List downloaded files
        run: |
          echo "📁 Downloaded files:"
          ls -la downloads/

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: downloads/
          retention-days: 7

      - name: Display download info
        if: always()
        run: |
          echo "✅ Download completed!"
          echo "📂 File saved in: downloads/"
          if [ -f "downloads/${{ steps.download.outputs.downloaded_file }}" ]; then
            FILE_SIZE=$(du -h "downloads/${{ steps.download.outputs.downloaded_file }}" | cut -f1)
            echo "📊 File size: ${FILE_SIZE}"
          fi

name: Video Downloader - Run Inside GitHub Actions

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL to download"
        required: true
        default: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      format:
        description: "Output format (mp4 (with Audio), mp4 (without Audio), mp3, avi, mkv)"
        required: false
        default: "mp4 (with Audio)"
      resolution:
        description: "Video quality (best, 1080, 720, 480, 360)"
        required: false
        default: "720"
      bitrate:
        description: "Audio bitrate (320, 256, 192, 128)"
        required: false
        default: "192"
      filename:
        description: "Output filename (without extension)"
        required: false
        default: "downloaded_video"
      folder:
        description: "Download folder"
        required: false
        default: "downloads"
      download_playlist:
        description: "Download entire playlist (true/false)"
        required: false
        default: "false"

jobs:
  download-video:
    name: Download Video Using Video Downloader
    runs-on: ubuntu-latest

    steps:
      # 1. Clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      # 4. Verify installations (Python & FFmpeg only)
      - name: Verify installations
        run: |
          echo "=== Python ==="
          python --version
          echo "=== FFmpeg ==="
          ffmpeg -version | head -1

      # 5. Install Python dependencies (no requirements.txt needed)
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp
          # Add any other packages your main.py needs, for example:
          # pip install requests beautifulsoup4
        shell: bash

      # 6. Create download directory
      - name: Create download directory
        run: mkdir -p ${{ github.event.inputs.folder }}

      # 7. Run the main downloader
      - name: Download video
        id: download
        run: |
          # Build command with proper escaping
          CMD="python main.py --cli \"${{ github.event.inputs.url }}\""

          if [ -n "${{ github.event.inputs.format }}" ]; then
            CMD="$CMD -f \"${{ github.event.inputs.format }}\""
          fi

          if [ -n "${{ github.event.inputs.resolution }}" ]; then
            CMD="$CMD -r \"${{ github.event.inputs.resolution }}\""
          fi

          if [ -n "${{ github.event.inputs.bitrate }}" ]; then
            CMD="$CMD -b \"${{ github.event.inputs.bitrate }}\""
          fi

          if [ -n "${{ github.event.inputs.filename }}" ]; then
            CMD="$CMD -n \"${{ github.event.inputs.filename }}\""
          fi

          if [ -n "${{ github.event.inputs.folder }}" ]; then
            CMD="$CMD -d \"${{ github.event.inputs.folder }}\""
          fi

          if [ "${{ github.event.inputs.download_playlist }}" == "true" ]; then
            CMD="$CMD -a \"--yes-playlist\""
          else
            CMD="$CMD -a \"--no-playlist\""
          fi

          echo "Running: $CMD"
          echo "----------------------------------------"

          # Run the command
          eval $CMD
          DOWNLOAD_EXIT_CODE=$?

          echo "----------------------------------------"
          echo "Exit code: $DOWNLOAD_EXIT_CODE"

          if [ $DOWNLOAD_EXIT_CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "exit_code=$DOWNLOAD_EXIT_CODE" >> $GITHUB_OUTPUT
          fi
        shell: bash
        continue-on-error: true

      # 8. List downloaded files
      - name: List downloaded files
        if: always()
        run: |
          echo "=== Downloaded files ==="
          if [ -d "${{ github.event.inputs.folder }}" ]; then
            ls -la ${{ github.event.inputs.folder }}/ || echo "No files found"
            echo "File sizes:"
            find ${{ github.event.inputs.folder }} -type f -exec ls -lh {} \; 2>/dev/null || echo "No files"
          else
            echo "Download folder does not exist"
          fi

      # 9. Upload artifact
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video-${{ github.run_id }}
          path: ${{ github.event.inputs.folder }}/*
          retention-days: 7
          if-no-files-found: ignore

      # 10. Generate summary
      - name: Generate summary
        if: always()
        run: |
          echo "# Video Download Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Download Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ github.event.inputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Format** | ${{ github.event.inputs.format }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resolution** | ${{ github.event.inputs.resolution }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bitrate** | ${{ github.event.inputs.bitrate }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Filename** | ${{ github.event.inputs.filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Download Playlist** | ${{ github.event.inputs.download_playlist }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ steps.download.outputs.status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.download.outputs.exit_code }}" ]; then
            echo "| **Exit Code** | ${{ steps.download.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for downloaded files
          if [ -d "${{ github.event.inputs.folder }}" ]; then
            FILE_COUNT=$(ls -1 ${{ github.event.inputs.folder }}/ 2>/dev/null | wc -l)
            if [ $FILE_COUNT -gt 0 ]; then
              echo "## ✅ Files Downloaded" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
              echo "|------|------|" >> $GITHUB_STEP_SUMMARY
              for f in ${{ github.event.inputs.folder }}/*; do
                if [ -f "$f" ]; then
                  SIZE=$(du -h "$f" | cut -f1)
                  NAME=$(basename "$f")
                  echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
                fi
              done
            else
              echo "## ⚠️ No Files Found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "The download completed but no files were found in the download folder." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## ❌ Download Folder Missing" >> $GITHUB_STEP_SUMMARY
          fi

      # 11. Fallback: try direct yt-dlp if main.py fails or was skipped
      - name: Fallback - Direct yt-dlp download
        if: failure() && steps.download.outputs.status != 'success'
        run: |
          echo "🔄 Main downloader did not succeed, trying direct yt-dlp..."
          echo "=========================================="

          # Install yt-dlp directly (in case the main step didn't have it)
          pip install yt-dlp

          # Build yt-dlp command
          YT_CMD="yt-dlp -o \"${{ github.event.inputs.folder }}/%(title)s.%(ext)s\""

          if [ "${{ github.event.inputs.format }}" == "mp3" ]; then
            YT_CMD="$YT_CMD -x --audio-format mp3"
            if [ -n "${{ github.event.inputs.bitrate }}" ]; then
              YT_CMD="$YT_CMD --audio-quality ${{ github.event.inputs.bitrate }}"
            fi
          elif [ "${{ github.event.inputs.format }}" == "mp4 (with Audio)" ]; then
            if [ "${{ github.event.inputs.resolution }}" != "best" ] && [ -n "${{ github.event.inputs.resolution }}" ]; then
              YT_CMD="$YT_CMD -f \"bestvideo[height<=${{ github.event.inputs.resolution }}]+bestaudio/best[height<=${{ github.event.inputs.resolution }}]\""
            else
              YT_CMD="$YT_CMD -f bestvideo+bestaudio"
            fi
          elif [ "${{ github.event.inputs.format }}" == "mp4 (without Audio)" ]; then
            if [ "${{ github.event.inputs.resolution }}" != "best" ] && [ -n "${{ github.event.inputs.resolution }}" ]; then
              YT_CMD="$YT_CMD -f \"bestvideo[height<=${{ github.event.inputs.resolution }}]\""
            else
              YT_CMD="$YT_CMD -f bestvideo"
            fi
          else
            YT_CMD="$YT_CMD -f best"
          fi

          if [ "${{ github.event.inputs.download_playlist }}" == "true" ]; then
            YT_CMD="$YT_CMD --yes-playlist"
          else
            YT_CMD="$YT_CMD --no-playlist"
          fi

          echo "Fallback command: $YT_CMD ${{ github.event.inputs.url }}"
          echo "----------------------------------------"

          eval $YT_CMD "${{ github.event.inputs.url }}"
        shell: bash
        continue-on-error: true

      # 12. List files after fallback
      - name: List files after fallback
        if: always() && failure()
        run: |
          echo "=== Files after fallback ==="
          if [ -d "${{ github.event.inputs.folder }}" ]; then
            ls -la ${{ github.event.inputs.folder }}/ || echo "No files"
          else
            echo "Checking current directory:"
            ls -la *.mp4 *.mp3 *.mkv *.avi 2>/dev/null || echo "No media files found"
          fi

      # 13. Upload fallback artifact
      - name: Upload fallback artifact
        if: always() && failure()
        uses: actions/upload-artifact@v4
        with:
          name: fallback-download-${{ github.run_id }}
          path: |
            ${{ github.event.inputs.folder }}/*
            *.mp4
            *.mp3
            *.mkv
            *.avi
          retention-days: 7
          if-no-files-found: ignore
